<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS OS - Immersive HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --accent-blue: #00eaff;
            --bg-dark: #010409;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #root {
            width: 100%;
            height: 100%;
        }

        /* Fullscreen Boot Overlay (if used by React) */
        .boot-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #0f172a 0%, #010409 100%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .boot-overlay h1 {
            font-size: 4rem;
            letter-spacing: 2rem;
            color: white;
            text-shadow: 0 0 20px rgba(0, 234, 255, 0.5);
            margin-bottom: 20px;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
